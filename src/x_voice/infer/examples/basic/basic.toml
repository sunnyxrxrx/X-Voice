# Basic X-Voice inference config.
# Update ckpt_file to the actual Stage1 checkpoint path before running.

model = "XVoice_Base_Stage1"
model_cfg = ""
ckpt_file = "ckpts/stage1_model_500000.safetensors"
vocab_file = ""

ref_audio = "infer/examples/basic/basic_ref_en.wav"
ref_text = "Some call me nature, others call me mother nature."
gen_text = "I don't really care what you call me. I've been a silent spectator, watching species evolve, empires rise and fall. But always remember, I am mighty and enduring."
gen_file = ""

lang = "en"
ref_lang = "en"
gen_lang = "en"
auto_detect_lang = false
normalize_text = true

sp_type = "syllable"
srp_ckpt_file = ""
srp_model_cfg = ""

output_dir = "tests"
output_file = "infer_cli_basic.wav"
save_chunk = false
remove_silence = false

vocoder_name = "vocos"
load_vocoder_from_local = true

target_rms = 0.1
cross_fade_duration = 0.15
nfe_step = 32
cfg_strength = 2.5
cfg_strength2 = 4.0
cfg_schedule = "square"
cfg_decay_time = 0.6
sway_sampling_coef = -1.0
speed = 1.0

denoise_ref = true
loudness_norm = true
post_processing = true
reverse = false
