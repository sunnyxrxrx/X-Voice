
hydra:
  run:
    dir: ckpts/${model.name}_${model.mel_spec.mel_spec_type}_${model.tokenizer}_${datasets.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}

datasets:
  name: multilingual_phase2
  batch_size_per_gpu: 38400  # 8 GPUs, 8 * 38400 = 307200
  batch_size_type: frame  # frame | sample
  max_samples: 32  # max sequences per batch if use frame-wise batch_size. we set 32 for small models, 64 for base models
  num_workers: 16
  root_dir: /inspire/hdd/project/embodied-multimodality/chenxie-25019/rixixu/datasets/wavs

optim:
  epochs: 5
  learning_rate: 7.5e-5
  num_warmup_updates: 20000  # warmup updates
  grad_accumulation_steps: 1  # note: updates = steps / grad_accumulation_steps
  max_grad_norm: 1.0  # gradient clipping
  bnb_optimizer: False  # use bnb 8bit AdamW optimizer or not

model:
  name: F5TTS_v1_Base_multilingual_full_catada_sft_v2  # model name
  tokenizer: ipa_v6  # tokenizer type
  tokenizer_path: null  # if 'custom' tokenizer, define the path want to use (should be vocab.txt)
  backbone: DiT
  sft: True
  use_total_text: False # input ref text + target text or only input target text
  frame_duration: True
  lang_drop_prob: 0.1
  cond_drop_prob: 0.1
  arch:
    dim: 1024
    depth: 22
    heads: 16
    ff_mult: 2
    text_dim: 512
    text_mask_padding: True
    conv_layers: 4
    qk_norm: null  # null | rms_norm
    pe_attn_head: null
    attn_backend: torch  # torch | flash_attn
    attn_mask_enabled: False
    checkpoint_activations: False  # recompute activations and save memory for extra compute
    languages: ["bg","cs","da","de","el","en", "es", "et", "fi", "fr", "hr", "hu","id","it","ja","ko","lt","lv","mt","nl","pl","pt","ro","ru","sk","sl","sv","th","vi","zh"]
    text_infill_lang_type: ada
    time_infill_lang_type: time_concat
    use_swiglu: False
    use_rmsnorm: False
    use_ctc: False
    lang_dim: 512
    lang_dim_in_t: 512
    drop_lang_in_time: False
    share_lang_embed: True
  mel_spec:
    target_sample_rate: 24000
    n_mel_channels: 100
    hop_length: 256
    win_length: 1024
    n_fft: 1024
    mel_spec_type: vocos  # vocos | bigvgan
  vocoder:
    is_local: True  # use local offline ckpt or not
    local_path: my_vocoder/vocos-mel-24khz  # local vocoder path

ckpts:
  logger: tensorboard  # wandb | tensorboard | null
  log_samples: True  # infer random sample per save checkpoint. wip, normal to fail with extra long samples
  save_per_updates: 5000  # save checkpoint per updates
  keep_last_n_checkpoints: -1  # -1 to keep all, 0 to not save intermediate, > 0 to keep last N checkpoints
  last_per_updates: 5000  # save last checkpoint per updates
  save_dir: ckpts/${model.name}_${model.mel_spec.mel_spec_type}_${model.tokenizer}_${datasets.name}
  pretrained_path: ckpts/F5TTS_v1_Base_multilingual_full_catada_stress_nomask/model_500000.pt

attn:
  attn_backend: flash_attn # flash_attn | torch
  attn_mask_enabled: True # True | False

# accelerate launch src/x_voice/train/train_sft.py  --config-name F5TTS_v1_Base_multilingual_full_catada_sft_v2.yaml
